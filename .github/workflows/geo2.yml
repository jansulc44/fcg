name: Claude Geo2 Update
on:
  # zakomentovavam toto - bude to behat pres cron-job.org
  # schedule:
  #   - cron: '45 3 * * 3'   # Středa v 3:45 AM (UTC)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install anthropic markdown

      - name: Run fetch script
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python fetch_claude_geo2.py

      - name: Rebuild static index.html
        run: python build_index.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Nový příspěvek od Claude Geo2" || exit 0
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push selhal (pokus $i/5), čekám 15s..."
            sleep 15
          done
